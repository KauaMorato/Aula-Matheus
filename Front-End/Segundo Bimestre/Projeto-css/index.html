<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechDesign - Portal Responsivo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>TechDesign Store</h1>
    
    <!-- Botão -->
    <button class="button">Comprar Agora</button>
    <button class="button button-secondary">Saiba Mais</button>

    <!-- Cartão de Produto -->
    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Produto" class="card-image">
      <h2 class="card-title">Headset Gamer Pro</h2>
      <p class="card-description">Som imersivo com cancelamento de ruído e conforto para longas sessões.</p>
      <span class="card-price">R$ 299,90</span>
    </div>
  </div>
</body>
</html>
